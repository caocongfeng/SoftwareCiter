<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Software Citation Annotation Tool (Lite)</title>
<style>
:root{--bg:#f6f8fb;--card:#fff;--border:#d9e0ea;--text:#1f2937;--muted:#667085;--accent:#2563eb;--ok:#059669;--warn:#dc2626}
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
header{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--border);padding:14px 20px}
h1{margin:0 0 4px;font-size:22px}
.small{font-size:13px;color:var(--muted)}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:8px}
button{padding:7px 12px;border:1px solid var(--border);background:#fff;border-radius:8px;cursor:pointer;font-size:13px}
button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
button:hover{opacity:.85}
.layout{display:grid;grid-template-columns:320px 1fr;gap:16px;padding:16px;align-items:start}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px}
.list{max-height:72vh;overflow:auto;margin-top:8px}
.sample-item{padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;margin-bottom:6px;cursor:pointer;font-size:13px}
.sample-item.active{outline:2px solid var(--accent);background:#f0f4ff}
.sample-meta{font-size:11px;color:var(--muted);margin-top:2px}
.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
pre{white-space:pre-wrap;word-break:break-word;background:#f4f6fa;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:13px}
.field-card{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px}
.field-title{font-weight:700;margin-bottom:6px}
.options label{display:inline-block;margin-right:12px;margin-bottom:4px;font-size:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;margin:0 4px 4px 0}
textarea,input[type="text"]{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:13px}
textarea{min-height:70px}
.summary-box{line-height:1.7;font-size:13px}
.status{margin-left:auto;font-size:13px;color:var(--muted)}
.success{color:var(--ok);font-weight:600}
a.url-link{color:var(--accent);text-decoration:none;word-break:break-all}
a.url-link:hover{text-decoration:underline}
.tree-group{margin-bottom:4px}
.tree-header{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;background:#f0f4ff;border:1px solid var(--border);margin-bottom:2px}
.tree-header:hover{background:#e0e8ff}
.tree-done{background:#ecfdf5}
.tree-arrow{font-size:10px;width:14px;text-align:center;flex-shrink:0}
.tree-count{margin-left:auto;font-size:12px;color:var(--muted);white-space:nowrap}
.tree-children{padding-left:14px}
.agreement-row{display:flex;align-items:center;gap:18px;margin:6px 0}
.agreement-row label{font-size:14px;font-weight:600;cursor:pointer}
.agreement-row input[type="radio"]{transform:scale(1.2);margin-right:4px}
.auto-saved{color:var(--ok);font-size:12px;opacity:0;transition:opacity .3s}
.auto-saved.show{opacity:1}
</style>
</head>
<body>
<header>
<h1>Software Citation Annotation Tool (Lite)</h1>

<button class="primary" onclick="downloadResults()">Export Results JSONL</button>
<button onclick="downloadProgress()">Save Progress</button>
<input type="file" id="progressInput" accept=".json" style="max-width:140px"/>
<button onclick="loadProgressFromInput()">Load Progress</button>
<span class="status" id="statusText"></span>
<span class="auto-saved" id="autoSavedHint">Auto-saved ✔</span>
</div>
</header>
<div class="layout">
<aside>
<div class="card"><strong>Guide</strong><ul class="small" id="guideList"></ul></div>
<div class="card"><strong>Sample List</strong><div class="small" id="listTip"></div><div class="list" id="sampleList"></div></div>
</aside>
<main>
<div id="mainContent" class="card">Loading...</div>
</main>
</div>

b"}, "version": {"type": "literal", "value": ""}, "developer": {"type": "literal", "value": ""}, "url": {"type": "literal", "value": ""}, "citation_evidence": {"type": "literal", "value": ""}, "evidence_sentences": {"type": "literal", "value": "Therefore, an individual can be traced from household to household over the course of his or her life (as long as he or she resides in the Matlab study area)."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3153932"}, "dataset_name": {"type": "literal", "value": "PLoS sentences"}, "software_id": {"type": "uri", "value": "https://www.wikidata.org/wiki/Q1204300"}, "software_name": {"type": "literal", "value": "Stata"}, "software_aliases": {"type": "literal", "value": "Stata"}, "version": {"type": "literal", "value": "11"}, "developer": {"type": "literal", "value": ""}, "url": {"type": "literal", "value": ""}, "citation_evidence": {"type": "literal", "value": ""}, "evidence_sentences": {"type": "literal", "value": "At the group level, network measures were used to statistically examine, using Poisson or Gaussian regression analysis in Stata 11, the associations among the individual and family attributes, social network structures, rates of wounding and social relocations across the seven enclosures."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3167763"}, "dataset_name": {"type": "literal", "value": "Pubmed fulltexts"}, "software_id": {"type": "uri", "value": "https://www.wikidata.org/wiki/Q181596"}, "software_name": {"type": "literal", "value": "SPSS statistics"}, "software_aliases": {"type": "literal", "value": "SPSS statistics"}, "version": {"type": "literal", "value": "17.0.0"}, "developer": {"type": "literal", "value": "SPSS Inc"}, "url": {"type": "literal", "value": ""}, "citation_evidence": {"type": "literal", "value": ""}, "evidence_sentences": {"type": "literal", "value": "All data were analysed using SPSS statistics version 17.0.0 released Aug 23. 2008 (SPSS : {"type": "uri", "value": "https://www.wikidata.org/wiki/Q378530"}, "software_name": {"type": "literal", "value": "Praat"}, "software_aliases": {"type": "literal", "value": "Praat"}, "version": {"type": "literal", "value": ""}, "developer": {"type": "literal", "value": ""}, "url": {"type": "literal", "value": ""}, "citation_evidence": {"type": "literal", "value": "[39]"}, "evidence_sentences": {"type": "literal", "value": "Next, we manipulated voice pitch using the Pitch-Synchronous Overlap Add (PSOLA) algorithm [38] in Praat acoustic phonetics software [39]. <SEP> Praat's pitch parameters were set at a minimum 50 Hz and maximum 300 Hz for men's voices, and a minimum 100 Hz and maximum 600 Hz for women's voices. <SEP> Window length was determined automatically by Praat."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3368909"}, "dataset_name": {"type": "literal", "value": "PLoS sentences"}, "software_id": {"type": "uri", "value": "https://www.wikidata.org/wiki/Q1204300"}, "software_name": {"type": "literal", "value": "Stata"}, "software_aliases": {"type": "literal", "value": "Stata"}, "version": {"type": "literal", "value": "10"}, "developer": {"type": "literal", "value": "StataCorp LP"}, "url": {"type": "literal", "value": ""}, "citation_evidence": {"type": "literal", "value": ""}, "evidence_sentences": {"type": "literal", "value": "Statistical analyses were performed using SPSS v15.0 (SPSS, Inc., Chicago, Illinois, USA) and Intercooled Stata 10 (StataCorp LP, College Station, Texas, USA) software packages."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3368909"}, "dataset_name": {"type": "literal", "value": "PLoS sentences"}, "software_id": {"type": "uri", "value": "https://www.wikidata.org/wiki/Q181596"}, "software_name": {"type": "literal", "value": "SPSS"}, "software_aliases": {"type": "literal", "value": "SPSS"}, "version": {"type": "literal", "value": "15.0"}, "developer": {"type": "literal", "value": "SPSS, Inc."}, "url": {"type": "literal", "value": ""}, "citation_evidence": {"type": "literal", "value": ""}, "evidence_sentences": {"type": "literal", "value": "Statistical analyses were performed using SPSS v15.0 (SPSS, Inc., Chicago, Illinois, USA) and Intercooled Stata 10 (StataCorp LP, College Station, Texas, USA) software packages."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3397979"}, "dataset_name": {"type": "literal", "value": "PLoS methods"}, "software_id": {"type": "uri", "value": "http://marsbar.sourceforge.net"}, "software_name": {"type": "literal", "value": "Marsbar"}, "software_aliases": {"type": "literal", "value": "Marsbar"}, "version": {"type": "literal", "value": ""}, "developer": {"type": "literal", "value": ""}, "url": {"type": "literal", "value": ""}, "citation_evidence": {"type": "literal", "value": "[24]"}, "evidence_sentences": {"type": "literal", "value": "We defined a hypothalamic region of interest (with Marsbar, [24]) by modeling brain activation across all subjects and androstadienone concentrations, and built a region of interest for the cluster of hypothalamic activation (peak voxel MNI-coordinates: x = 2, y = −6, z = 0; volume size = 250 mm3)."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3397979"}, "dataset_name": {"type": "literal", "value": "PLoS methods"}, "software_id": {"type": "uri", "value": "https://www.nitrc.org/projects/wfu_pickatlas"}, "software_name": {"type": "literal", "value": "Pickatlas"}, "software_aliases": {"type": "literal", "value": "Pickatlas"}, "version": {"type": "literal", "value": ""}, "developer": {"type": "literal", "value": "Wake Forest University"}, "url": {"type": "literal", "value": ""}, "citation_evidence": {"type": "literal", "value": "[31]"}, "evidence_sentences": {"type": "literal", "value": "The anatomical borders for each area of interest were defined by using overlays generated by the Wake Forest University (WFU) Pickatlas [31] toolbox for SPM."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3397979"}, "dataset_name": {"type": "literal", "value": "PLoS methods"}, "software_id": {"type": "uri", "value": "https://www.wikidata.org/wiki/Q41566485"}, "software_name": {"type": "literal", "value": "SPM"}, "software_aliases": {"type": "literal", "value": "SPM"}, "version": {"type": "literal", "value": "8"}, "developer": {"type": "literal", "value": "Wellcome Trust Centre for Neuroimaging"}, "url": {"type": "literal", "value": "http://www.fil.ion.ucl.ac.uk/spm"}, "citation_evidence": {"type": "literal", "value": ""}, "evidence_sentences": {"type": "literal", "value": "The anatomical borders for each area of interest were defined by using overlays generated by the Wake Forest University (WFU) Pickatlas [31] toolbox for SPM. <SEP> fMRI data were analyzed using SPM8 (Wellcome Trust Centre for Neuroimaging, http://www.fil.ion.ucl.ac.uk/spm)."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3420898"}, "dataset_name": {"type": "literal", "value": "PLoS methods"}, "software_id": {"type": "uri", "value": "http://www3.psych.purdue.edu/~willia55/Announce/cyberball.htm"}, "software_name": {"type": "literal", "value": "Cyberball"}, "software_aliases": {"type": "literal", "value": "Cyberball"}, "version": {"type": "literal", "value": ""}, "developer": {"type": "literal", "value": ""}, "url": {"type": "literal", "value": ""}, "citation_evidence": {"type": "literal", "value": ""}, "evidence_sentences": {"type": "literal", "value": "A very similar approach has recently been used in another Cyberball study [13]. <SEP> After scanning, each subject was assessed using a self-report ‘social distress’ rating questionnaire [10] used in previous Cyberball studies [13]. <SEP> Also, previous research has shown that subjects experience similar level of distress when playing Cyberball against a computer as when they think they are playing against real people [20]. <SEP> Participants had a short training session with Cyberball before playing the task in the scanner. <SEP> Subjects performed a version of the ‘Cyberball’ social exclusion task whilst being scanned [19]."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3420898"}, "dataset_name": {"type": "literal", "value": "PLoS methods"}, "software_id": {"type": "uri", "value": "https://www.wikidata.org/wiki/Q41566485"}, "software_name": {"type": "literal", "value": "SPM"}, "software_aliases": {"type": "literal", "value": "SPM"}, "version": {"type": "literal", "value": "8"}, "developer": {"type": "literal", "value": ""}, "url": {"type": "literal", "value": "http://www.fil.ion.ucl.ac.uk/spm"}, "citation_evidence": {"type": "literal", "value": ""}, "evidence_sentences": {"type": "literal", "value": "For each subject, the covariate image used for second level analyses was the SPM8 ‘beta’ image, which comprised the estimated linear regression coefficient between the percentage of social exclusion and observed BOLD signal. <SEP> SPM8 (http://www.fil.ion.ucl.ac.uk/spm) was used for analysis. <SEP> The average realigned image was used to derive parameters for spatial normalization to the SPM8 Montreal Neurological Institute (MNI) template with the parameters applied to each image of the time-series. <SEP> The social exclusion and motor response regressors were convolved with the SPM8 haemodynamic response function without time or dispersion derivatives."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3436805"}, "dataset_name": {"type": "literal", "value": "Creation Sentences"}, "software_id": {"type": "uri", "value": "http://www.korbel.embl.de/software.html"}, "software_name": {"type": "literal", "value": "DELLY"}, "software_aliases": {"type": "literal", "value": "DELLY"}, "version": {"type": "literal", "value": ""}, "developer": {"type": "literal", "value": ""}, "url": {"type": "literal", "value": "http://www.korbel.embl.de/software.html"}, "citation_evidence": {"type": "literal", "value": ""}, "evidence_sentences": {"type": "literal", "value": "Availability: DELLY is available at http://www.korbel.embl.de/software.html <SEP> DELLY is suitable for detecting copy-number variable deletion and tandem duplication events as well as balanced rearrangements such as inversions or reciprocal translocations. <SEP> Herein, we report a new integrative approach, called DELLY, that combines short-range and long-range paired-end mapping and split-read analysis for the discovery-at single nucleotide resolution-of balanced and unbalanced forms of structural variation, i.e. deletions, tandem duplications, inversions and translocations, achieving high sensitivity and specificity throughout the genome and for SVs falling into a wide size spectrum. <SEP> On real data, DELLY reliably uncovers SVs from the 1000 Genomes Project and cancer genomes, and validation experiments of randomly selected deletion loci show a high specificity. <SEP> Results: We have developed an SV discovery method, called DELLY, that integrates short insert paired-ends, long-range mate-pairs and split-read alignments to accurately delineate genomic rearrangements at single-nucleotide resolution."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3490915"}, "dataset_name": {"type": "literal", "value": "PLoS sentences"}, "software_id": {"type": "uri", "value": "https://www.wikidata.org/wiki/Q1355082"}, "software_name": {"type": "literal", "value": "Prism"}, "software_aliases": {"type": "literal", "value": "Prism"}, "version": {"type": "literal", "value": "5.04"}, "developer": {"type": "literal", "value": "GraphPad || GraphPad Software"}, "url": {"type": "literal", "value": ""}, "citation_evidence": {"type": "literal", "value": ""}, "evidence_sentences": {"type": "literal", "value": "All statistical analyses were carried out using GraphPad Prism version 5.04 for Windows, GraphPad Software, San Diego, CA, www.grap "literal", "value": ""}, "citation_evidence": {"type": "literal", "value": ""}, "evidence_sentences": {"type": "literal", "value": "Secondly, STATISTICA 10.0 (StatSoft, Tulsa, OK) software was used to construct the MLP network model, the SVM model, the GPR model and the MLR model of the relationship between the identified predictors and QOL."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3536769"}, "dataset_name": {"type": "literal", "value": "PLoS methods"}, "software_id": {"type": "uri", "value": "https://cran.r-project.org/package=tnet"}, "software_name": {"type": "literal", "value": "tnet"}, "software_aliases": {"type": "literal", "value": "tnet"}, "version": {"type": "literal", "value": ""}, "developer": {"type": "literal", "value": ""}, "url": {"type": "literal", "value": ""}, "citation_evidence": {"type": "literal", "value": "[21]"}, "evidence_sentences": {"type": "literal", "value": "For each thresholded network we then obtained the small-world parameters, namely, the number of edges, the clustering coefficient, and the characteristic path length by using the tnet software [21]. <SEP> Network parameters (clustering coefficient, characteristic path length and number of edges) were then calculated for each connectivity matrix by using the tnet software [21]. <SEP> Subsequently the correlation matrix of each subject was subjected to tnet software [21], [32], [33], which calculated the small-world indices for each individual subject (for further details see [19])."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3536769"}, "dataset_name": {"type": "literal", "value": "PLoS methods"}, "software_id": {"type": "uri", "value": "https://www.wikidata.org/wiki/Q169478"}, "software_name": {"type": "literal", "value": "MATLAB"}, "software_aliases": {"type": "literal", "value": "MATLAB"}, "version": {"type": "literal", "value": ""}, "developer": {"type": "literal", "value": ""}, "url": {"type": "literal", "value": ""}, "citation_evidence": {"type": "literal", "value": "[23]"}, "evidence_sentences": {"type": "literal", "value": "All statistical analyses in the present study were performed with MATLAB [23]."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3547792"}, "dataset_name": {"type": "literal", "value": "Creation Sentences"}, "software_id": {"type": "uri", "value": "https://github.com//bionomicron/Redirector.git"}, "software_name": {"type": "literal", "value": "Redirector"}, "software_aliases": {"type": "literal", "value": "Redirector"}, "version": {"type": "literal", "value": ""}, "developer": {"type": "literal", "value": ""}, "url": {"type": "literal", "value": "https://github.com//bionomicron/Redirector.git"}, "citation_evidence": {"type": "literal", "value": ""}, "evidence_sentences": {"type": "literal", "value": "The Redirector Package including operational software code and metabolic network model files used for this publication are available at https://github.com//bionomicron/Redirector.git. <SEP> The Redirector framework provides a new capability in modeling metabolic alterations, using the FBA objective. <SEP> To demonstrate its capacity to optimize challenging pathways, we have applied Redirector to the production of myristoyl-CoA, examining the highest growth parameter design as well as the dependency analysis of multiple designs. <SEP> We compare the final set of flux values resulting from this Redirector optimization to fluxes resulting from the optimization for biomass. <SEP> We present Redirector, a new Flux Balance Analysis-based framework for identifying engineering targets to optimize metabolite production in complex pathways."}}, {"article_id": {"type": "uri", "value": "http://data.gesis.org/somesci/PMC3561195"}, "dataset_name": {"type": "literal", "value": "PLoS sentences"}, "software_id": {"type": "uri", "value": "https://www.wikidata.org/wiki/Q2003932"}, "software_name": {"type": "literal", "value": "SAS"}, "software_a let samples=[], annotations={}, evidenceIndex={}, currentIndex=-1;

const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const normalize = s => String(s||'').toLowerCase().trim().replace(/[_\-]+/g,' ').replace(/\s+/g,' ').replace(/[^\w\s]/g,'');
const pmcidFrom = a => { const m = String(a||'').match(/PMC\d+/i); return m ? m[0].toUpperCase() : ''; };
const splitAliases = t => String(t||'').split(/\|\|/).map(x => normalize(x)).filter(Boolean);

function makeLink(url) {
  if (!url) return '';
  const u = String(url).trim();
  if (u.match(/^https?:\/\//)) return `<a class="url-link" href="${esc(u)}" target="_blank" rel="noopener">${esc(u)}</a>`;
  if (u.match(/^10\.\d{4,}/)) return `<a class="url-link" href="https://doi.org/${esc(u)}" target="_blank" rel="noopener">${esc(u)}</a>`;
  return esc(u);
}

  if (TOOL_MODE === 'full') {
    ann.metadata_eval = {name:'correct',version:'correct',authors:'correct',year:'correct',publisher:'correct',doi:'correct',url:'correct'};
    ann.corrections = {name:m.name||'',version:m.version||'',authors:m.authors||'',year:m.year||'',publisher:m.publisher||'',doi:m.doi||'',url:m.url||'',citation_text:sample.citation_text||''};
    ann.completeness_fields = {name:1,version:1,author:1,year:1,publisher:1,doi_or_url:1};
    ann.error_type = [];
  }
  return ann;
}

function ensureAnn(s) { if(!annotations[s.key]) annotations[s.key]=defaultAnnotation(s); return annotations[s.key]; }

function flattenInput(records) {
  const out = [];
  records.forEach(rec => {
    const list = Array.isArray(rec.software_citations) ? rec.software_citations :
                 (Array.isArray(rec.predicted_citations) ? rec.predicted_citations : []);
    list.forEach((sw,idx) => out.push({
      key: `${(rec.pmcid||'').toUpperCase()}__${sw.software_name||'unknown'}__${idx}`,
      pmcid: (rec.pmcid||'').toUpperCase(),
      article_id: rec.article_id||'',
      software_name: sw.software_name||'',
      software_id: sw.software_id||'',
      dataset_name: sw.dataset_name||'',
      citation_text: sw.citation_text||'',
      citation_text_original: sw.citation_text_original||'',
      enriched_metadata: sw.enriched_metadata||sw.metadata||{},
      original_data: sw.original_data||{},
      enrichment_source: sw.enrichment_source||'',
      verification_issues: sw.verification_issues||[],
      verification_status: sw.verification_status||''
    }));
  });
  return out;
}

function buildEvidenceIndex(records) {
  const idx = {};
  records.forEach(rec => {
    const articleId = rec.article_id && rec.article_id.value != null ? rec.article_id.value : (rec.article_id||'');
    const pmcid = pmcidFrom(articleId);
    const name = rec.software_name && rec.software_name.value != null ? rec.software_name.value : (rec.software_name||'');
    const aliases = rec.software_aliases && rec.software_aliases.value != null ? rec.software_aliases.value : (rec.software_aliases||'');
    const evidence = rec.evidence_sentences && rec.evidence_sentences.value != null ? rec.evidence_sentences.value : (rec.evidence_sentences||'');
    const cite = rec.citation_evidence && rec.citation_evidence.value != null ? rec.citation_evidence.value : (rec.citation_evidence||'');
    const aliasSet = new Set([normalize(name), ...splitAliases(aliases)]);
    const entry = {pmcid, software_name:name, software_aliases:aliases, citation_evidence:cite, evidence_sentences:evidence, aliases_norm:Array.from(aliasSet).filter(Boolean)};
    if (!pmcid) return;
    if (!idx[pmcid]) idx[pmcid] = [];
    idx[pmcid].push(entry);
  });
  return idx;
}

function findEvidence(sample) {
  const cand = evidenceIndex[sample.pmcid] || [];
  const t = normalize(sample.software_name);
  if (!t) return null;
  let best = cand.find(e => e.aliases_norm.includes(t));
  if (!best) {
    const compact = t.replace(/\s+/g,'');
    best = cand.find(e => e.aliases_norm.some(a => a.replace(/\s+/g,'') === compact));
  }
  if (!best) return null;
  return {
    citation_evidence: best.citation_evidence || '',
    evidence_sentences: String(best.evidence_sentences||'').split(/<SEP>/)[0].trim(),
    matched_by: `${sample.pmcid} + ${sample.software_name} \u2194 ${best.software_name}${best.software_aliases?' / '+best.software_aliases:''}`
  };
}

function init() {
  samples = flattenInput(GROUND_TRUTH);
  evidenceIndex = buildEvidenceIndex(SOMESCI_BINDINGS);
  const saved = localStorage.getItem('annotation_' + TOOL_MODE);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      annotations = data.annotations || {};
      currentIndex = typeof data.currentIndex === 'number' ? data.currentIndex : 0;
    } catch(e) { console.warn('Restore failed:', e); }
  }
  samples.forEach(ensureAnn);
  if (currentIndex < 0 || currentIndex >= samples.length) currentIndex = samples.length ? 0 : -1;
  renderSampleList(); renderCurrent(); updateStatus();
}

function autoSave() {
  localStorage.setItem('annotation_' + TOOL_MODE, JSON.stringify({annotations, currentIndex}));
  const el = document.getElementById('autoSavedHint');
  if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1500); }
}

function updateStatus() {
  const pubItems = {};
  samples.forEach(s => { if(!pubItems[s.pmcid]) pubItems[s.pmcid]=[]; pubItems[s.pmcid].push(s); });
  const totalPubs = Object.keys(pubItems).length;
  const donePubs = Object.values(pubItems).filter(items => items.every(s => ensureAnn(s).__completed)).length;
  document.getElementById('statusText').textContent = samples.length ?
    UI.status_fmt.replace('__DONE__', donePubs).replace('__TOTAL__', totalPubs) : UI.status_empty;
}

function renderSampleList() {
  const root = document.getElementById('sampleList');
  if (!samples.length) { root.innerHTML = `<div class="small">${UI.no_samples}</div>`; return; }
  const groups=[], seen={};
  samples.forEach((s,i) => {
    if (!seen[s.pmcid]) { seen[s.pmcid]={pmcid:s.pmcid,items:[]}; groups.push(seen[s.pmcid]); }
    seen[s.pmcid].items.push({sample:s, index:i});
  });
  root.innerHTML = groups.map(g => {
    const allDone = g.items.every(it => ensureAnn(it.sample).__completed);
    const doneCnt = g.items.filter(it => ensureAnn(it.sample).__completed).length;
    const mark = allDone ? '\u2705' : '\u2b1c';
    const expanded = g.items.some(it => it.index === currentIndex);
    return `<div class="tree-group"><div class="tree-header ${allDone?'tree-done':''}" onclick="togglePmcid('${g.pmcid}')"><span class="tree-arrow" id="arrow_${g.pmcid}">${expanded?'\u25bc':'\u25b6'}</span> ${mark} <strong>${esc(g.pmcid)}</strong><span class="tree-count">${doneCnt}/${g.items.length}</span></div><div class="tree-children" id="children_${g.pmcid}" style="display:${expanded?'block':'none'}">${g.items.map(it => {
      const ann = ensureAnn(it.sample);
      const m2 = ann.__completed ? '\u2705' : '\u2b1c';
      return `<div class="sample-item ${it.index===currentIndex?'active':''}" onclick="goToSample(${it.index})"><div>${m2} <strong>${esc(it.sample.software_name)}</strong></div><div class="sample-meta">#${it.index+1}</div></div>`;
    }).join('')}</div></div>`;
  }).join('');
}
function togglePmcid(pmcid) {
  const el = document.getElementById('children_'+pmcid);
  const arrow = document.getElementById('arrow_'+pmcid);
  if (el.style.display==='none') { el.style.display='block'; arrow.textContent='\u25bc'; }
  else { el.style.display='none'; arrow.textContent='\u25b6'; }
}

function goToSample(i) { saveCurrent(); currentIndex=i; renderSampleList(); renderCurrent(); }
function prevSample() { if(currentIndex>0) goToSample(currentIndex-1); }
function nextSample() { if(currentIndex<samples.length-1) goToSample(currentIndex+1); }

const radioGroup = (name,val,ops) => `<div class="options">` + ops.map(op =>
  `<label><input type="radio" name="${name}" value="${op.value}" ${String(val)===String(op.value)?'checked':''}> ${op.label}</label>`
).join('') + `</div>`;
const checkbox = (name,checked,label) => `<label><input type="checkbox" name="${name}" ${checked?'checked':''}> ${label}</label>`;
const getRadio = name => { const el=document.querySelector(`input[name="${name}"]:checked`); return el?el.value:''; };

function renderField(field, value, note, corr) {
  const ann = ensureAnn(samples[currentIndex]);
  const display = (field==='url' || field==='doi') ? makeLink(value) : esc(value);
  return `<div class="field-card"><div class="field-title">${field}</div><div class="small" style="margin-bottom:4px">${note}</div><pre>${display}</pre>${radioGroup(`field_${field}`, ann.metadata_eval[field], [{value:'correct',label:UI.correct},{value:'incorrect',label:UI.incorrect},{value:'missing',label:UI.missing}])}<div class="small" style="margin:6px 0 3px">${UI.correction_box}</div><input type="text" id="corr_${field}" value="${esc(corr)}"/></div>`;
}

function renderCurrent() {
  const root = document.getElementById('mainContent');
  if (currentIndex<0 || !samples.length) { root.innerHTML='<div class="small">No data loaded.</div>'; return; }
  const s = samples[currentIndex], ann = ensureAnn(s), m = s.enriched_metadata||{};
  const evidence = findEvidence(s);

  const evHtml = evidence ?
    `<div class="card"><h3>${UI.evidence_section}</h3><div><strong>${UI.matched_by}</strong>: ${esc(evidence.matched_by)}</div><div style="margin-top:6px"><strong>${UI.citation_evidence}</strong>: ${esc(evidence.citation_evidence||UI.none)}</div><div style="margin-top:6px"><strong>${UI.evidence_sentences}</strong></div><pre>${esc(evidence.evidence_sentences)}</pre></div>` :
    `<div class="card"><h3>${UI.evidence_section}</h3><div class="small">${UI.no_evidence}</div></div>`;

  let html = '';

  // ── 1. Info card ──
  html += `<div class="card"><div class="grid2">
    <div>
      <div><strong>${UI.pmcid}</strong>: ${esc(s.pmcid)}</div>
      <div><strong>${UI.software_name}</strong>: ${esc(s.software_name)}</div>
      <div><strong>${UI.dataset_name}</strong>: ${esc(s.dataset_name)}</div>
      <div><strong>${UI.software_id}</strong>: ${makeLink(s.software_id)}</div>
    </div><div>
      <div><strong>${UI.enrichment_source}</strong>: ${esc(s.enrichment_source)}</div>
      <div><strong>${UI.verification_status}</strong>: ${esc(s.verification_status)}</div>
      <div><strong>${UI.verification_issues}</strong>:</div>
      <div>${(s.verification_issues||[]).length ? (s.verification_issues||[]).map(x=>`<span class="badge">${esc(x)}</span>`).join('') : `<span class="small">${UI.none}</span>`}</div>
    </div></div></div>`;

  // ── 2. Evidence ──
  html += evHtml;

  // ── 3. Original data + Enriched metadata preview ──
  html += `<div class="card"><div class="grid2">
    <div><strong>${UI.original_data}</strong><pre>${esc(JSON.stringify(s.original_data||{},null,2))}</pre></div>
    <div><strong>${UI.enriched_metadata}</strong><pre>${esc(JSON.stringify(m||{},null,2))}</pre></div>
  </div><div class="grid2" style="margin-top:10px">
    <div><strong>${UI.citation_text}</strong><pre>${esc(s.citation_text||'')}</pre></div>
    <div><strong>${UI.citation_text_original}</strong><pre>${esc(s.citation_text_original||'')}</pre></div>
  </div></div>`;

  // ── 4. Overall Judgments (with Agreement inside) ──
  html += `<div class="card"><h3>${UI.overall_title}</h3>
    <div class="field-card"><div class="field-title">${UI.agreement_title}</div>
      <div class="small" style="margin-bottom:6px">${UI.agreement_note}</div>
      <div class="agreement-row">${radioGroup('agreement', ann.agreement, [{value:1,label:'1 \u2714'},{value:0,label:'0 \u2718'}])}</div>
    </div>
    <div class="grid3">
      <div class="field-card"><div class="field-title">${UI.metadata_correct}</div>${radioGroup('metadata_correct',ann.metadata_correct,[{value:'yes',label:UI.yes},{value:'no',label:UI.no}])}</div>
      <div class="field-card"><div class="field-title">${UI.hallucination}</div>${radioGroup('hallucination',ann.hallucination,[{value:'yes',label:UI.yes},{value:'no',label:UI.no}])}</div>
      <div class="field-card"><div class="field-title">${UI.citation_correct}</div>${radioGroup('citation_correct',ann.citation_correct,[{value:'yes',label:UI.yes},{value:'no',label:UI.no}])}</div>
    </div>
    <div class="field-card"><div class="field-title">${UI.citation_correction}</div><input type="text" id="corr_citation_text" value="${esc(ann.corrections.citation_text||s.citation_text||'')}"/></div>
  </div>`;

  // ── 5. Per-field metadata evaluation (FULL only) ──
  if (TOOL_MODE === 'full') {
    html += `<div class="card"><h3>${UI.enriched_metadata}</h3>
      ${renderField('name', m.name||'', UI.field_notes.name, ann.corrections.name||'')}
      ${renderField('version', m.version||'', UI.field_notes.version, ann.corrections.version||'')}
      ${renderField('authors', m.authors||'', UI.field_notes.authors, ann.corrections.authors||'')}
      ${renderField('year', m.year||'', UI.field_notes.year, ann.corrections.year||'')}
      ${renderField('publisher', m.publisher||'', UI.field_notes.publisher, ann.corrections.publisher||'')}
      ${renderField('doi', m.doi||'', UI.field_notes.doi, ann.corrections.doi||'')}
      ${renderField('url', m.url||'', UI.field_notes.url, ann.corrections.url||'')}
    </div>`;
  }

  // ── 6. Principles ──
  html += `<div class="card"><h3>${UI.principles_title}</h3><div class="small">${UI.principles_note}</div>
    <div class="grid4">
      <div class="field-card"><div class="field-title">${UI.attribution}</div>${radioGroup('p_attribution',ann.principle_score.attribution,[{value:1,label:'1'},{value:0,label:'0'}])}</div>
      <div class="field-card"><div class="field-title">${UI.identification}</div>${radioGroup('p_identification',ann.principle_score.identification,[{value:1,label:'1'},{value:0,label:'0'}])}</div>
      <div class="field-card"><div class="field-title">${UI.accessibility}</div>${radioGroup('p_accessibility',ann.principle_score.accessibility,[{value:1,label:'1'},{value:0,label:'0'}])}</div>
      <div class="field-card"><div class="field-title">${UI.specificity}</div>${radioGroup('p_specificity',ann.principle_score.specificity,[{value:1,label:'1'},{value:0,label:'0'}])}</div>
    </div></div>`;

  // ── 7. Completeness (FULL only) ──
  if (TOOL_MODE === 'full') {
    html += `<div class="card"><h3>${UI.completeness_title}</h3><div class="small">${UI.completeness_note}</div>
      <div class="grid3">
        <div class="field-card">${checkbox('c_name',ann.completeness_fields.name===1,UI.comp_name)}</div>
        <div class="field-card">${checkbox('c_version',ann.completeness_fields.version===1,UI.comp_version)}</div>
        <div class="field-card">${checkbox('c_author',ann.completeness_fields.author===1,UI.comp_author)}</div>
        <div class="field-card">${checkbox('c_year',ann.completeness_fields.year===1,UI.comp_year)}</div>
        <div class="field-card">${checkbox('c_publisher',ann.completeness_fields.publisher===1,UI.comp_publisher)}</div>
        <div class="field-card">${checkbox('c_doi_or_url',ann.completeness_fields.doi_or_url===1,UI.comp_doi_or_url)}</div>
      </div></div>`;
  }

  // ── 8. Error Types (FULL only) ──
  if (TOOL_MODE === 'full') {
    html += `<div class="card"><h3>${UI.errors_title}</h3><div class="small">${UI.errors_note}</div>
      <div class="grid3">${UI.error_types.map(et => `<div class="field-card">${checkbox('e_'+et, ann.error_type.includes(et), et)}</div>`).join('')}</div></div>`;
  }

  // ── 9. Notes + buttons + summary ──
  html += `<div class="card"><h3>${UI.notes_title}</h3>
    <textarea id="annotator_note" placeholder="${UI.notes_placeholder}">${esc(ann.annotator_note||'')}</textarea>
    <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap">
      <button class="primary" onclick="markDone()">${UI.mark_done}</button>
      <button onclick="saveCurrent()">${UI.save_current}</button>
    </div></div>
    <div class="card summary-box" id="summaryBox"></div>`;

  root.innerHTML = html;
  updateSummary();
}

function saveCurrent() {
  if (currentIndex<0 || !samples.length) return;
  const s = samples[currentIndex], ann = ensureAnn(s);
  ann.agreement = Number(getRadio('agreement') ?? ann.agreement);
  ann.metadata_correct = getRadio('metadata_correct') || ann.metadata_correct;
  ann.hallucination = getRadio('hallucination') || ann.hallucination;
  ann.citation_correct = getRadio('citation_correct') || ann.citation_correct;
  const cit = document.getElementById('corr_citation_text');
  ann.corrections.citation_text = cit ? cit.value : ann.corrections.citation_text;
  if (TOOL_MODE === 'full') {
    ['name','version','authors','year','publisher','doi','url'].forEach(f => {
      ann.metadata_eval[f] = getRadio(`field_${f}`) || ann.metadata_eval[f];
      const corr = document.getElementById(`corr_${f}`);
      ann.corrections[f] = corr ? corr.value : ann.corrections[f];
    });
    ['name','version','author','year','publisher','doi_or_url'].forEach(f => {
      const el = document.querySelector(`input[name="c_${f}"]`);
      if (el) ann.completeness_fields[f] = el.checked ? 1 : 0;
    });
    ann.error_type = UI.error_types.filter(et => { const el=document.querySelector(`input[name="e_${et}"]`); return el && el.checked; });
  }
  ann.principle_score.attribution = Number(getRadio('p_attribution') || ann.principle_score.attribution);
  ann.principle_score.identification = Number(getRadio('p_identification') || ann.principle_score.identification);
  ann.principle_score.accessibility = Number(getRadio('p_accessibility') || ann.principle_score.accessibility);
  ann.principle_score.specificity = Number(getRadio('p_specificity') || ann.principle_score.specificity);
  const noteEl = document.getElementById('annotator_note');
  ann.annotator_note = noteEl ? noteEl.value : '';
  annotations[s.key] = ann;
  updateSummary(); updateStatus(); autoSave();
}

function markDone() { saveCurrent(); annotations[samples[currentIndex].key].__completed=true; renderSampleList(); updateStatus(); autoSave(); }

function updateSummary() {
  if (currentIndex<0) return;
  const ann = ensureAnn(samples[currentIndex]);
  const p = Object.values(ann.principle_score).map(Number);
  const pavg = p.reduce((a,b)=>a+b,0)/p.length;
  let t = `<strong>${UI.summary_title}</strong><br>agreement: <strong>${ann.agreement}</strong><br>${UI.metadata_correct}: <span class="success">${ann.metadata_correct}</span><br>${UI.citation_correct}: <span class="success">${ann.citation_correct}</span><br>${UI.hallucination}: ${ann.hallucination}<br>principle_avg: <strong>${pavg.toFixed(2)}</strong>`;
  if (TOOL_MODE === 'full') {
    const c = Object.values(ann.completeness_fields).map(Number);
    const cavg = c.reduce((a,b)=>a+b,0)/c.length;
    t += `<br>completeness: <strong>${cavg.toFixed(2)}</strong><br>errors: ${ann.error_type.length?ann.error_type.join(', '):UI.none}`;
  }
  document.getElementById('summaryBox').innerHTML = t;
}

function buildExport() {
  saveCurrent();
  return samples.map(s => {
    const ann = ensureAnn(s);
    const p = Object.values(ann.principle_score).map(Number);
    const evidence = findEvidence(s);
    const rec = {
      pmcid: s.pmcid, article_id: s.article_id,
      software_name: s.software_name, software_id: s.software_id,
      dataset_name: s.dataset_name, citation_text: s.citation_text,
      enriched_metadata: s.enriched_metadata, original_data: s.original_data,
      matched_evidence: evidence ? { matched_by:evidence.matched_by, citation_evidence:evidence.citation_evidence, evidence_sentences:evidence.evidence_sentences } : null,
      annotation: {
        agreement: ann.agreement,
        metadata_correct: ann.metadata_correct,
        hallucination: ann.hallucination,
        citation_correct: ann.citation_correct,
        corrections: ann.corrections,
        principle_score: ann.principle_score,
        principle_compliance_avg: Number((p.reduce((a,b)=>a+b,0)/p.length).toFixed(4)),
        annotator_note: ann.annotator_note,
        completed: !!ann.__completed
      }
    };
    if (TOOL_MODE === 'full') {
      const c = Object.values(ann.completeness_fields).map(Number);
      rec.annotation.metadata_eval = ann.metadata_eval;
      rec.annotation.completeness_fields = ann.completeness_fields;
      rec.annotation.completeness_score = Number((c.reduce((a,b)=>a+b,0)/c.length).toFixed(4));
      rec.annotation.error_type = ann.error_type;
    }
    return rec;
  });
}

function downloadResults() {
  const payload = buildExport();
  const blob = new Blob([payload.map(x => JSON.stringify(x)).join('\n')], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download = TOOL_MODE === 'full' ? 'annotation_results_full.jsonl' : 'annotation_results_lite.jsonl';
  a.click();
}
function downloadProgress() {
  saveCurrent();
  const blob = new Blob([JSON.stringify({annotations, exported_at:new Date().toISOString()},null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download = 'annotation_progress.json'; a.click();
}
function loadProgressFromInput() {
  const f = document.getElementById('progressInput').files[0];
  if (!f) return alert('Please select a progress file first.');
  f.text().then(t => {
    try {
      annotations = (JSON.parse(t).annotations) || {};
      samples.forEach(ensureAnn);
      renderSampleList(); renderCurrent(); updateStatus();
    } catch(e) { alert('Parse error: ' + e.message); }
  });
}
window.addEventListener('DOMContentLoaded', init);

</script>
